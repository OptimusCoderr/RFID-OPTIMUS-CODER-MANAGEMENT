version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: rfid_user
      POSTGRES_PASSWORD: rfid_password
      POSTGRES_DB: rfid_management
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rfid_user -d rfid_management"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://rfid_user:rfid_password@postgres:5432/rfid_management?schema=public
      PORT: 4000
      CLIENT_ORIGIN: http://localhost:5173
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access-secret-min-32-chars-long}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Generate with: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"}
    ports:
      - "4000:4000"
    # Run migrations then start the API on container boot.
    command: sh -c "npx prisma migrate deploy && node dist/index.js"

  client:
    build: ./client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:80"

volumes:
  postgres_data:
