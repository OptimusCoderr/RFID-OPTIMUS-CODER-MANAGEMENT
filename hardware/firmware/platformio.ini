; RFID Optimus Encoder firmware — ESP32 + PN532 (NFC) + W5500 (Ethernet) + WiFi.
; See ../README.md for the "could not compile-verify this in the sandboxed
; environment it was written in" disclosure before trusting this blindly.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Arduino-ESP32 core 2.0.x — pinned rather than left floating so
; WiFi.h/SPI.h/Ethernet-library behavior matches what this code was written
; against. Core 3.x (ESP-IDF 5.x based) changed enough of the networking
; stack that this should be re-verified before bumping.
platform_packages =
    framework-arduinoespressif32 @ ~3.20014.0

monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DCORE_DEBUG_LEVEL=2

; Ethernet (W5500) support comes from the core's own ETH.h, not a separate
; library — see NetworkManager.cpp for why the classic arduino-libraries/
; Ethernet shield library is deliberately NOT used here.
lib_deps =
    adafruit/Adafruit PN532 @ ^1.3.3
    bblanchon/ArduinoJson @ ^7.1.0
    links2004/WebSockets @ ^2.4.1
    adafruit/Adafruit NeoPixel @ ^1.12.0
    adafruit/Adafruit MAX1704X @ ^1.0.3
