name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    name: Server (typecheck, build, test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rfid_user
          POSTGRES_PASSWORD: rfid_password
          POSTGRES_DB: rfid_management_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rfid_user -d rfid_management_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: server

    env:
      DATABASE_URL: postgresql://rfid_user:rfid_password@localhost:5432/rfid_management_test?schema=public
      JWT_ACCESS_SECRET: ci-access-secret-please-change-1234567890
      ENCRYPTION_KEY: "1111111111111111111111111111111111111111111111111111111111111111"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npx tsc -p tsconfig.json --noEmit
      - run: npm run build
      - run: npm test

  client:
    name: Client (typecheck, build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build
